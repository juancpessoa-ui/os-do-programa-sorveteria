components:
  schemas:
    Login:
      required:
        - nome
        - email
        - senha
        - nivel_de_acesso
      type: object
      properties:
        nome:
          type: string
        email:
          type: string
        senha:
          type: string
        nivel_de_acesso:
          type: string

    Usuario:
      required:
        - nome
        - email
        - senha
        - nivel_de_acesso
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
        senha:
          type: string
        nivel_de_acesso:
          type: boolean

    Produto:
      required:
        - nome
        - descricao
        - preco
        - status
        - tamanho
        - img
        - categorias
        - sabores
        - ingredientes
        - tags
        - promocoes
        - lote
        - tamanhos
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: string
        preco:
          type: number
        status:
          type: boolean
        tamanho:
          type: string
        img:
          type: file
        categorias:
          type: array
          items:
            type: integer
        sabores:
          type: array
          items:
            type: integer
        ingredientes:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: integer
        promocoes:
          type: array
          items:
            type: integer
        lote:
          type: array
          items:
            type: integer
        tamanhos:
          type: array
          items:
            type: integer

    Categoria:
      required:
        - categoria
      type: object
      properties:
        id:
          type: integer
        categoria:
          type: string

    Sabor:
      required:
        - sabor
      type: object
      properties:
        id:
          type: integer
        sabor:
          type: string

    Ingrediente:
      required:
        - ingrediente
      type: object
      properties:
        id:
          type: integer
        ingrediente:
          type: string

    Tag:
      required:
        - tag
      type: object
      properties:
        id:
          type: integer
        tag:
          type: string

    Promocao:
      required:
        - valor_atual
        - valor_promocao
        - status
      type: object
      properties:
        id:
          type: integer
        valor_atual:
          type: number
        valor_promocao:
          type: number
        status:
          type: boolean

    Lote:
      required:
        - data_fabricacao
        - data_validade
        - quantidade
      type: object
      properties:
        id:
          type: integer
        data_fabricacao:
          type: string
        data_validade:
          type: string
        quantidade:
          type: integer
        
    Tamanho:
      required:
        - tamanho
      type: object
      properties:
        id:
          type: integer
        tamanho:
          type: string