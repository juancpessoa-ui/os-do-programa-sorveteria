<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/css/login.css">

    <!--FONTE-->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet" />

    <!--JAVASCRIPT-->
    <script src="src/js/login.js" defer></script>
    
</head>
<body>

    <!--O ASIDE VEM AQUI-->
  <aside class="aside">
    <div class="sidebar-titulo"> <img class="logo-sorvetudos" src="./src/img/Sorvetudos.png" alt=""> Sorvetudos</div>
  </aside>
    <main class="main" id="main-content">
        <header class="page-header">
            <h1 class="page-title">Login</h1>
        </header>

        <form method="post">
            <label for="nome">
                Nome:
                <input type="text" name="nome" id="nome">
            </label>
            
            
            
            <label for="email">
                Email:
                <input type="email" name="email" id="email">
            </label>
            
            
            <label for="senha">
                Senha:
                <input type="password" name="senha" id="senha">
            </label>

            <a href="#" id="dashboard"><input type="button" value="Entrar" id="entrar"></a>
        </form>
    </main>
</body>
</html>
