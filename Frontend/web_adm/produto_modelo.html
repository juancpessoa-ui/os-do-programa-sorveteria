<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/produto.css">

    <script src="src/js/cadastrar_produto.js" defer></script>
</head>
<body>
    <aside class="aside">
        <div class="sidebar-titulo"> <img class="logo-sorvetudos" src="./src/img/Sorvetudos.png" alt=""> Sorvetudos</div>
        <ul class="sidebar-nave">
          <li><a href="#"><i class="nave-icone"><img class="logo-dashboard" src="./src/img/Dashboard.png" alt=""></i> Dashboard</a></li>
          <li class="active"><a href="#"><i class="nave-icone"><img class="logo-novo-produto" src="./src/img/Novo Produto.png" alt=""></i> Novo Produto</a></li>
          <li><a href="#"><i class="nave-icone"><img class="logo-promocoes" src="./src/img/Promoções.png" alt=""></i> Promoções</a></li>
          <li><a href="#"><i class="nave-icone"><img class="logo-lotes" src="./src/img/Lotes.png" alt=""></i> Lotes</a></li>
        </ul>
        <div class="sidebar-space"></div>
        <div class="sidebar-exit">
          <a href="#"><i class="nave-icone"><img class="logo-sair" src="./src/img/Sair.png" alt=""></i> Sair</a>
        </div>
    </aside>

    <main class="main" id="main-content">
        <header class="page-header">
            <h1 class="page-title">Criar Produto</h1>
        </header>

        <form>
            <label for="imagem">
                Imagem:
                <input type="file" name="imagem" id="imagem">
            </label>

            <label for="">
                Preço:
                <input type="number" name="preco" id="preco">
            </label>

            <label for="">
                Sabor:
                <input type="text" name="sabor" id="sabor">
            </label>

            <label for="">
                Nome do produto:
                <input type="text" name="nome-produto" id="nome-produto">
            </label>

            <label for="">
                Categoria:
                <input type="checkbox" name="cremosos" id="cremosos">Cremosos
                <input type="checkbox" name="cremosos" id="cremosos">Frutados
            </label>

            <label for="">
                Tag:
                <input type="checkbox" name="em-alta" id="em-alta">Em alta
            </label>

            <label for="">
                Ingredientes:
                <input type="checkbox" name="creme-de-leite" id="creme-de-leite">creme de leite
            </label>

            <label for="">
                Tamanho:
                <input type="checkbox" name="G" id="G">G
            </label>

            <label for="">
                Descrição:
                <textarea name="descricao" id="descricao" cols="30" rows="10"></textarea>
            </label>
        </form>

        <input type="button" value="Cadastrar Produto" id="cadastrar-produto">
    </main>
</body>
</html>
