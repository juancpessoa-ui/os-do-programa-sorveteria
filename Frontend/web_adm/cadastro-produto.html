<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorvetudos — Novo Produto</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS separado por responsabilidade -->
    <link rel="stylesheet" href="src/css/cadastro-produto/reset.css"  />
    <link rel="stylesheet" href="src/css/cadastro-produto/layout.css" />
    <link rel="stylesheet" href="src/css/cadastro-produto/chips.css"  />
    <link rel="stylesheet" href="src/css/cadastro-produto/upload.css" />
    <link rel="stylesheet" href="src/css/cadastro-produto/modal.css"  />
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="./src/css/skeleton-loading.css">

  <!--JAVASCRIPT-->
    <script src="src/js/cadastro-produto/app.js" defer type="module"  ></script>
    <script src="src/js/cadastro-produto/modal.js" defer type="module"></script>
    <script src="src/js/aside.js" defer></script>
</head>
<body>

<div class="layout">

    <!--ASIDE VEM AQUI-->
  <aside class="aside">
    <div class="sidebar-titulo"> <img class="logo-sorvetudos" src="./src/img/Sorvetudos.png" alt=""> Sorvetudos</div>
    <ul class="sidebar-nave">
      <li><a href="dashboard.html"><i class="nave-icone"><img class="logo-dashboard" src="./src/img/Dashboard.png" alt=""></i> Dashboard</a></li>
      <li><a href="usuarios.html"><i class="nave-icone"><img class="logo-usuarios" src="./src/img/Usuarios.png" alt=""></i> Usuários</a></li>
      <li><a href="cadastro-produto.html"><i class="nave-icone"><img class="logo-novo-produto" src="./src/img/Novo Produto.png" alt=""></i> Novo Produto</a></li>
      <li><a href="#"><i class="nave-icone"><img class="logo-promocoes" src="./src/img/Promoções.png" alt=""></i> Promoções</a></li>
      <li><a href="#"><i class="nave-icone"><img class="logo-lotes" src="./src/img/Lotes.png" alt=""></i> Lotes</a></li>
    </ul>
    <div class="sidebar-space"></div>
    <div class="sidebar-exit">
      <a href="index.html"><i class="nave-icone"><img class="logo-sair" src="./src/img/Sair.png" alt=""></i> Sair</a>
    </div>
  </aside>

  <main class="main">
    <h1 class="pagina-titulo">Novo Produto</h1>

    <div class="secao">
      <span class="secao-label">Imagem</span>
      
        <div class="dropzone" id="dropzone" title="Clique ou arraste uma imagem aqui">
          <div class="fora">
          <input type="file" id="input-arquivo" accept="image/*" style="display:none" />
          
          <div class="upload-placeholder" id="upload-placeholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Carregue a imagem aqui</span>
        </div>
      </div>
        <img id="imagem-preview" class="imagem-preview" alt="Preview do produto" />

        <button class="btn-remover-imagem" id="btn-remover-imagem" title="Remover imagem" aria-label="Remover imagem">✕</button>
      </div>
    </div>

    <div class="campos-linha">
      <div class="campo-grupo">
        <label class="campo-label" for="input-preco">Preço &lt;R$&gt;</label>
        <input id="input-preco" class="campo-input" type="number"
               min="0" step="0.01" placeholder="EX: 10.90" />
      </div>
      <div class="campo-grupo">
        <label class="campo-label" for="input-nome">Nome do Produto</label>
        <input id="input-nome" class="campo-input" type="text"
               placeholder="EX: Sorvete de Chocolate" />
      </div>
    </div>


    <div class="secao">
      <span class="secao-label">Categoria</span>
      <div class="chips-wrapper" id="categorias-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
      <div class="chips-acoes">
        <button class="btn-acao-chip btn-acao-chip--deletar" aria-label="Deletar categoria">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>

        </button>

        <button class="btn-acao-chip btn-acao-chip--adicionar" aria-label="Adicionar categoria">+</button>

        <button class="btn-acao-chip btn-acao-chip--editar" aria-label="Editar categoria">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>

        </button>

      </div>
    </div>

    <div class="secao">
      <span class="secao-label">Sabor</span>
      <div class="chips-wrapper" id="sabores-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
      <div class="chips-acoes">
        <button class="btn-acao-chip btn-acao-chip--deletar" aria-label="Deletar sabor">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>

        </button>

        <button class="btn-acao-chip btn-acao-chip--adicionar" aria-label="Adicionar sabor">+</button>

        <button class="btn-acao-chip btn-acao-chip--editar" aria-label="Editar sabor">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          
        </button>
      </div>
    </div>

    <!-- === TAG ============================================ -->
    <div class="secao">
      <span class="secao-label">Tag</span>
      <div class="chips-wrapper" id="tags-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
      <div class="chips-acoes">
        <button class="btn-acao-chip btn-acao-chip--deletar"  aria-label="Deletar tag">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>

        </button>

        <button class="btn-acao-chip btn-acao-chip--adicionar" aria-label="Adicionar tag">+</button>

        <button class="btn-acao-chip btn-acao-chip--editar" aria-label="Editar tag">

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>

        </button>

      </div>
    </div>

    <!-- === TAMANHO (radio — seleção única) ================ -->
    <div class="secao">
      <span class="secao-label">Tamanho</span>
      <div class="chips-wrapper" id="tamanhos-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
      <div class="chips-acoes">
        <button class="btn-acao-chip btn-acao-chip--deletar"  aria-label="Deletar tamanho">

          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>

        </button>

        <button class="btn-acao-chip btn-acao-chip--adicionar" aria-label="Adicionar tamanho">+</button>

        <button class="btn-acao-chip btn-acao-chip--editar" aria-label="Editar tamanho">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>

        </button>

      </div>
    </div>

    <!-- === INGREDIENTES =================================== -->
    <div class="secao">
      <span class="secao-label">Ingredientes</span>
      <div class="chips-wrapper chips-wrapper--grade" id="ingredientes-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
      <div class="chips-acoes">
        <button class="btn-acao-chip btn-acao-chip--deletar" aria-label="Deletar ingrediente">

        <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>

        </button>

        <button class="btn-acao-chip btn-acao-chip--adicionar" aria-label="Adicionar ingrediente">+</button>

        <button class="btn-acao-chip btn-acao-chip--editar" aria-label="Editar ingrediente">

            <!--MUDAR ESSE SVG PARA O ICONE DPS-->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>

        </button>
      </div>
    </div>

    <div class="secao">
      <div class="campo-grupo">
        <label class="campo-label" for="input-descricao">Descrição</label>
        <textarea id="input-descricao" class="campo-textarea" placeholder="Conte a história desse sabor..."></textarea>
      </div>
    </div>

    <button id="btn-cadastrar" class="btn-cadastrar">Cadastrar Produto</button>

  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-caixa" id="modal-caixa"></div>
</div>


</body>
</html>
