<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorvetudos — Editar Produto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/css/style.css" />
  <link rel="stylesheet" href="src/css/dashboard.css" />
  <link rel="stylesheet" href="src/css/produto.css" />
  <link rel="stylesheet" href="./src/css/skeleton-loading.css">

  <script src="src/js/editar-produto.js" defer></script>
</head>
<body>

  <aside class="aside">
    <div class="sidebar-titulo">
      <img class="logo-sorvetudos" src="./src/img/Sorvetudos.png" alt="">
      Sorvetudos
    </div>

    <ul class="sidebar-nave">
      <li><a href="dashboard.html"><i class="nave-icone"><img class="logo-dashboard" src="./src/img/Dashboard.png" alt=""></i> Dashboard</a></li>
      <li><a href="usuarios.html"><i class="nave-icone"><img class="logo-usuarios" src="./src/img/Usuarios.png" alt=""></i> Usuários</a></li>
      <li><a href="cadastro-produto.html"><i class="nave-icone"><img class="logo-novo-produto" src="./src/img/Novo Produto.png" alt=""></i> Novo Produto</a></li>
    </ul>

    <div class="sidebar-space"></div>

    <div class="sidebar-exit">
      <a href="index.html">
        <i class="nave-icone"><img class="logo-sair" src="./src/img/Sair.png" alt=""></i>
        Sair
      </a>
    </div>
  </aside>

  <main class="main" id="main-content">

    <header class="page-header">
      <h1 class="page-title pagina-titulo">Carregando…</h1>
    </header>

    <!-- IMAGEM (dropzone com preview da imagem atual) -->
    <section class="secao">
      <span class="secao-label">Imagem</span>
      <div class="imagem-wrapper">
        <div class="dropzone" id="dropzone" title="Clique ou arraste para trocar a imagem">
          <input type="file" id="input-arquivo" accept="image/*" style="display:none" />
          <div class="upload-placeholder" id="upload-placeholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span>Carregue a imagem aqui</span>
          </div>
        </div>
      </div>
    </section>

    <!-- NOME + PREÇO -->
    <div class="campos-linha">
      <div class="campo-grupo">
        <label class="campo-label" for="campo-nome">Nome do Produto</label>
        <input id="campo-nome" class="campo-input" type="text" placeholder="EX: Sorvete de Chocolate" />
      </div>
      <div class="campo-grupo">
        <label class="campo-label" for="campo-preco">Preço &lt;R$&gt;</label>
        <input id="campo-preco" class="campo-input" type="number" min="0" step="0.01" placeholder="EX: 18.90" />
      </div>
    </div>

     <!-- CATEGORIAS -->
    <div class="secao">
      <span class="secao-label">Categorias</span>
      <div class="chips-wrapper" id="categorias-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
    </div>

    <!-- SABORES -->
    <div class="secao">
      <span class="secao-label">Sabor</span>
      <div class="chips-wrapper" id="sabores-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
    </div>

    <!-- TAGS -->
    <div class="secao">
      <span class="secao-label">Tag</span>
      <div class="chips-wrapper" id="tags-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
    </div>

    <!-- TAMANHOS -->
    <div class="secao">
      <span class="secao-label">Tamanho</span>
      <div class="chips-wrapper" id="tamanhos-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
    </div>

    <!-- INGREDIENTES -->
    <div class="secao">
      <span class="secao-label">Ingredientes</span>
      <div class="chips-wrapper chips-wrapper--grade" id="ingredientes-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
    </div>

    <!-- DESCRIÇÃO -->
    <div class="secao secao-descricao">
      <div class="campo-grupo">
        <label class="campo-label" for="campo-descricao">Descrição</label>
        <textarea id="campo-descricao" class="campo-textarea" rows="5"
                  placeholder="Conte a história desse sabor..."></textarea>
      </div>
    </div>

    <!-- CONFIRMAR -->
    <button id="btn-confirmar" class="btn-confirmar-edicao">Confirmar Edição</button>

  </main>

</body>
</html>
